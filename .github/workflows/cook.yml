name: Cook Ingress data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

concurrency:
  group: ingress-cook
  cancel-in-progress: false

jobs:
  cook:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_SOURCE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_SOURCE_FOLDER_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: cooker/requirements.txt

      - name: Install dependencies
        run: pip install -r cooker/requirements.txt

      - name: Sync raw records from Google Drive
        run: python cooker/sync_drive.py --out-dir cooker/raw --clean

      - name: Cook static dashboard data
        run: python cooker/cook.py --raw-dir cooker/raw

      - name: Commit cooked data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cooker/compiled cooker/references
          if git diff --cached --quiet; then
            echo "No cooked data changes to commit."
          else
            git commit -m "Update cooked Ingress data"
            git push
          fi
